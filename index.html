<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viksit Bharat 2047 Research Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --saffron:   #E07B39;
      --white:     #FAF8F4;
      --ink:       #1A1410;
      --stone:     #7A6F65;
      --green:     #1A6B3C;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }

    .tricolor {
      width: 100%;
      height: 4px;
      background: linear-gradient(to right,
        var(--saffron) 0% 33.3%,
        #FAF8F4     33.3% 66.6%,
        var(--green)   66.6% 100%
      );
    }

    /* Slowly rotating Chakra */
    .chakra-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      margin-left: calc(min(520px, 90vw) / -2);
      margin-top: calc(min(520px, 90vw) / -2);
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
      animation: spinChakra 60s linear infinite;
    }

    @keyframes spinChakra {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .chakra-wrap { animation: none; }
    }

    .chakra-wrap svg { width: 100%; height: 100%; }

    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    /* Chalo rotating block */
    .chalo-wrap {
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 3.8rem;
      position: relative;
    }

    .chalo-word {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 400;
      color: var(--ink);
      position: absolute;
      opacity: 0;
      transition: opacity 0.6s ease;
      line-height: 1.2;
    }
    .chalo-word.active { opacity: 1; }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 1.6rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--ink);
      max-width: 18ch;
      margin-bottom: 1.6rem;
    }

    h1 span { color: var(--saffron); }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--green);
      margin: 0 auto 1.6rem;
    }

    .tagline {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      font-weight: 300;
      color: var(--stone);
      max-width: 42ch;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .coming-soon {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
    }

    footer {
      position: fixed;
      bottom: 1.6rem;
      width: 100%;
      text-align: center;
      font-size: 0.72rem;
      color: var(--stone);
      letter-spacing: 0.04em;
      opacity: 0.7;
    }

    @media (prefers-reduced-motion: no-preference) {
      main > * {
        opacity: 0;
        transform: translateY(12px);
        animation: fadeUp 0.7s ease forwards;
      }
      .chalo-wrap  { animation-delay: 0.05s; }
      .eyebrow     { animation-delay: 0.2s; }
      h1           { animation-delay: 0.35s; }
      .divider     { animation-delay: 0.5s; }
      .tagline     { animation-delay: 0.6s; }
      .coming-soon { animation-delay: 0.72s; }

      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <div class="tricolor"></div>

  <div class="chakra-wrap" aria-hidden="true">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="90" fill="none" stroke="#1A3A6B" stroke-width="4"/>
      <circle cx="100" cy="100" r="10" fill="#1A3A6B"/>
      <circle cx="100" cy="100" r="78" fill="none" stroke="#1A3A6B" stroke-width="1.5"/>
      <g stroke="#1A3A6B" stroke-width="2">
        <line x1="100" y1="22" x2="100" y2="178"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(15 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(30 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(45 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(60 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(75 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(90 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(105 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(120 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(135 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(150 100 100)"/>
        <line x1="100" y1="22" x2="100" y2="178" transform="rotate(165 100 100)"/>
      </g>
    </svg>
  </div>

  <main>
    <div class="chalo-wrap" aria-label="Chalo — Let's go">
      <span class="chalo-word active">चलो</span>
      <span class="chalo-word">పోదాం</span>
      <span class="chalo-word">வாருங்கள்</span>
      <span class="chalo-word">চলো</span>
      <span class="chalo-word">चला</span>
      <span class="chalo-word">ચાલો</span>
      <span class="chalo-word">ਚਲੋ</span>
      <span class="chalo-word">ಹೋಗೋಣ</span>
      <span class="chalo-word">പോകാം</span>
      <span class="chalo-word">چلو</span>
    </div>

    <p class="eyebrow">August 15, 2047</p>
    <h1>Viksit Bharat 2047<br><span>Research Program</span></h1>
    <div class="divider"></div>
    <p class="tagline">Because 2047 won't build itself. This is India's moment.</p>
    <span class="coming-soon">Coming Soon</span>
  </main>

  <footer>august152047.in · चलो August 15, 2047 ™ · august152047 ™</footer>

  <script>
    const words = document.querySelectorAll('.chalo-word');
    let current = 0;
    setInterval(() => {
      words[current].classList.remove('active');
      current = (current + 1) % words.length;
      words[current].classList.add('active');
    }, 2200);
  </script>
</body>
</html>
